
services:
  web:
    build: backend/
    env_file:
      - .env
    volumes:
      - ./backend/airbcar_backend:/app/airbcar_backend
      - ./backend/airbcar_backend/media:/app/airbcar_backend/media
    ports:
      - "8000:8000"
    networks:
      - AirbNet
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      DEBUG: "True"
      # IMPORTANT: set SECRET_KEY in .env (never commit real values)
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      DATABASE_NAME: postgres
      DATABASE_USER: ${DATABASE_USER:-}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-}
      DATABASE_HOST: ${DATABASE_HOST:-}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      # Optional bootstrap superuser (avoid committing defaults)
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
      LOAD_INITIAL_FIXTURE: "1"
      # Email Configuration (Gmail SMTP)
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USE_TLS: "True"
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      FRONTEND_URL: http://localhost:3001
      BACKEND_URL: http://localhost:8000
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      PORT: 8000
      # Supabase Storage Configuration (CRITICAL for file uploads)
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET_PICS: ${SUPABASE_STORAGE_BUCKET_PICS:-Pics}
      
    restart: unless-stopped

  app:
    build: frontend/
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1.5G
    ports:
      # Frontend application port mapping: host:container
      - "3001:3001"
    environment:
      - NODE_ENV=development
      # Frontend port configuration - must match port mapping above
      - PORT=3001
      - DJANGO_API_URL=http://web:8000
      - NEXT_PUBLIC_DJANGO_API_URL=${NEXT_PUBLIC_DJANGO_API_URL:-http://localhost:8000}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - NODE_OPTIONS=--max-old-space-size=4096 --openssl-legacy-provider
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=2000
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
      - /app/.next  # Exclude .next directory from mount to avoid OneDrive file lock issues (EBUSY errors)
    networks:
      - AirbNet
    restart: unless-stopped


networks:
  AirbNet:
    driver: bridge