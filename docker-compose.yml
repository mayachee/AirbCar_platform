
services:
  web:
    build: backend/
    volumes:
      - ./backend/airbcar_backend:/app/airbcar_backend
      - ./backend/airbcar_backend/media:/app/airbcar_backend/media
    ports:
      - "8000:8000"
    networks:
      - AirbNet
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      DEBUG: "True"
      DATABASE_NAME: postgres
      DATABASE_USER: postgres.wtbmqtmmdobfvvecinif
      DATABASE_PASSWORD: Mayache+123455
      DATABASE_HOST: aws-1-eu-north-1.pooler.supabase.com
      DATABASE_PORT: 5432
      DJANGO_SUPERUSER_USERNAME: amine
      DJANGO_SUPERUSER_EMAIL: amine@a.com
      DJANGO_SUPERUSER_PASSWORD: amineamine
      LOAD_INITIAL_FIXTURE: "1"
      # Email Configuration (Gmail SMTP)
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USE_TLS: "True"
      EMAIL_HOST_USER: ayacheyassine2000@gmail.com
      EMAIL_HOST_PASSWORD: rmqjpvkmekdiugnz
      FRONTEND_URL: http://172.18.240.1:3001
      BACKEND_URL: http://localhost:8000
      DEFAULT_FROM_EMAIL: ayacheyassine2000@gmail.com
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      
    restart: unless-stopped

  app:
    build: frontend/
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1.5G
    ports:
      # Frontend application port mapping: host:container
      - "3001:3001"
    environment:
      - NODE_ENV=development
      # Frontend port configuration - must match port mapping above
      - PORT=3001
      - DJANGO_API_URL=http://web:8000
      - NEXT_PUBLIC_DJANGO_API_URL=http://localhost:8000
      - NEXTAUTH_URL=http://localhost:3001
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=712108051146-g9ksbf313hhl7n3nt69ot8np7gtvvd8o.apps.googleusercontent.com
      - DATABASE_URL=postgresql://postgres.wtbmqtmmdobfvvecinif:Mayache+123455@aws-1-eu-north-1.pooler.supabase.com:5432/postgres
      - NODE_OPTIONS=--max-old-space-size=4096 --openssl-legacy-provider
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=2000
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
      - /app/.next  # Exclude .next directory from mount to avoid OneDrive file lock issues (EBUSY errors)
    networks:
      - AirbNet
    restart: unless-stopped


networks:
  AirbNet:
    driver: bridge