# Render deployment configuration
# Place this file in the root of your repository

services:
  - type: web
    name: airbcar-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter  # or free for free tier
    healthCheckPath: /api/
    envVars:
      - key: DATABASE_HOST
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_PORT
        value: 5432
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true  # Render will generate this
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false  # Set to your Render domain
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to your frontend URL

