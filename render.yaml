services:
  - type: web
    name: airbcar-backend
    env: python
    region: frankfurt  # Change to your preferred region: oregon, frankfurt, singapore, mumbai, tokyo
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools wheel &&
      pip install -r requirements.txt
    startCommand: |
      cd airbcar_backend &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn airbcar_backend.wsgi:application --bind 0.0.0.0:$PORT --workers ${GUNICORN_WORKERS:-1} --timeout 120 --graceful-timeout 30 --config ../gunicorn_config.py

    rootDir: backend
    envVars:
      # Database Configuration
      - key: DATABASE_HOST
        value: aws-1-eu-north-1.pooler.supabase.com
      - key: DATABASE_PORT
        value: 5432
      - key: DATABASE_NAME
        value: postgres
      - key: DATABASE_USER
        value: postgres.wtbmqtmmdobfvvecinif
      - key: DATABASE_PASSWORD
        sync: false  # Set this manually in Render dashboard for security
        # Value: Mayache+123455
      
      # Django Configuration
      - key: SECRET_KEY
        sync: false  # Set this manually in Render dashboard for security
        # Value: AHZHdcJj7GgqAbvqbOZSK-RpA4tAws7NmvGK1hdp7GLXySV7CM2YY3XJ677PQZ_QmkE
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: airbcar-backend.onrender.com,.onrender.com,www.airbcar.com,airbcar.com
        # Also try to get from service (fallback)
        # fromService:
        #   type: web
        #   name: airbcar-backend
        #   property: host
      - key: DJANGO_SETTINGS_MODULE
        value: airbcar_backend.settings
      
      # URLs
      - key: FRONTEND_URL
        value: https://www.airbcar.com
      - key: BACKEND_URL
        fromService:
          type: web
          name: airbcar-backend
          property: host
      
      # Email Configuration (Resend HTTP API — Render blocks SMTP ports)
      # Sign up free at https://resend.com, get API key
      - key: RESEND_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: DEFAULT_FROM_EMAIL
        value: ayacheyassine2000@gmail.com
      
      # Supabase Storage Configuration (REQUIRED for image uploads)
      - key: SUPABASE_URL
        sync: false  # Set this manually in Render dashboard
        # Value: https://your-project-id.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false  # Set this manually in Render dashboard for security
        # Value: your-anon-key-here (get from Supabase Dashboard → Settings → API)
      # Optional: Use service role key for admin operations (more permissions)
      # - key: SUPABASE_SERVICE_ROLE_KEY
      #   sync: false
      #   # Value: your-service-role-key-here
      
      # Optional Performance Settings
      - key: GUNICORN_WORKERS
        value: "1"
      - key: PORT
        value: "8000"

