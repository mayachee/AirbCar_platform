services:
  - type: web
    name: airbcar-backend
    env: docker
    region: frankfurt  # Change to your preferred region: oregon, frankfurt, singapore, mumbai, tokyo
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      # Database Configuration
      - key: DATABASE_HOST
        value: aws-1-eu-north-1.pooler.supabase.com
      - key: DATABASE_PORT
        value: 5432
      - key: DATABASE_NAME
        value: postgres
      - key: DATABASE_USER
        value: postgres.wtbmqtmmdobfvvecinif
      - key: DATABASE_PASSWORD
        sync: false  # Set this manually in Render dashboard for security
        # Value: Mayache+123455
      
      # Django Configuration
      - key: SECRET_KEY
        sync: false  # Set this manually in Render dashboard for security
        # Value: AHZHdcJj7GgqAbvqbOZSK-RpA4tAws7NmvGK1hdp7GLXySV7CM2YY3XJ677PQZ_QmkE
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: airbcar-backend
          property: host
      - key: DJANGO_SETTINGS_MODULE
        value: airbcar_backend.settings
      
      # URLs - Update FRONTEND_URL after deploying your frontend to Vercel
      - key: FRONTEND_URL
        value: https://airbcar-platform.vercel.app  # Update this with your actual Vercel frontend URL after deployment
      - key: BACKEND_URL
        fromService:
          type: web
          name: airbcar-backend
          property: host
      
      # Email Configuration
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: ayacheyassine2000@gmail.com
      - key: EMAIL_HOST_PASSWORD
        sync: false  # Set this manually in Render dashboard for security
        # Value: rmqjpvkmekdiugnz
      - key: DEFAULT_FROM_EMAIL
        value: ayacheyassine2000@gmail.com
      
      # Optional Performance Settings
      - key: GUNICORN_WORKERS
        value: "1"
      - key: PORT
        value: "8000"

