name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.8'
  NODE_VERSION: '20'
  POSTGRES_DB: airbcar_db
  POSTGRES_USER: airbcar_user
  POSTGRES_PASSWORD: amineamine

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client netcat-openbsd gcc

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U ${{ env.POSTGRES_USER }}; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        working-directory: ./backend/airbcar_backend
        run: |
          python manage.py migrate --noinput
        env:
          GITHUB_ACTIONS: true
          DATABASE_NAME: ${{ env.POSTGRES_DB }}
          DATABASE_USER: ${{ env.POSTGRES_USER }}
          DATABASE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DJANGO_SETTINGS_MODULE: airbcar_backend.settings
          SECRET_KEY: test-secret-key-for-ci

      - name: Collect static files
        working-directory: ./backend/airbcar_backend
        run: |
          python manage.py collectstatic --noinput || echo "Collectstatic skipped"
        env:
          GITHUB_ACTIONS: true
          DATABASE_NAME: ${{ env.POSTGRES_DB }}
          DATABASE_USER: ${{ env.POSTGRES_USER }}
          DATABASE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DJANGO_SETTINGS_MODULE: airbcar_backend.settings
          SECRET_KEY: test-secret-key-for-ci

      - name: Run backend tests
        working-directory: ./backend/airbcar_backend
        run: |
          python manage.py test --verbosity=2
        env:
          GITHUB_ACTIONS: true
          DATABASE_NAME: ${{ env.POSTGRES_DB }}
          DATABASE_USER: ${{ env.POSTGRES_USER }}
          DATABASE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DJANGO_SETTINGS_MODULE: airbcar_backend.settings
          SECRET_KEY: test-secret-key-for-ci

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint || echo "Linting completed with warnings"
        continue-on-error: true

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false
          ESLINT_NO_DEV_ERRORS: true
          NODE_ENV: production
          NEXT_PUBLIC_DJANGO_API_URL: http://localhost:8000

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: airbcar-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: airbcar-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
