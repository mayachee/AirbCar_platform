name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: airbcar_db
          POSTGRES_USER: airbcar_user
          POSTGRES_PASSWORD: amineamine
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov factory-boy Faker

      - name: Run backend tests (pytest)
        working-directory: backend/airbcar_backend
        env:
          CI: "true"
          SECRET_KEY: "ci-test-key"
          USE_SQLITE_FOR_TESTS: "true"
          GITHUB_ACTIONS: "true"
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: airbcar_db
          DATABASE_USER: airbcar_user
          DATABASE_PASSWORD: amineamine
          DJANGO_SETTINGS_MODULE: airbcar_backend.settings
        run: |
          python -m pytest tests -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Run frontend linting (non-blocking)
        working-directory: frontend
        run: npm run lint || true

      - name: Run frontend build
        working-directory: frontend
        env:
          ESLINT_NO_DEV_ERRORS: "true"
          CI: "false"
        run: npm run build
