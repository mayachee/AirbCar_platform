<!DOCTYPE html>
<html>
<head>
    <title>Test Partner Endpoint</title>
</head>
<body>
    <h1>Test Partner Public Endpoint</h1>
    <button onclick="testEndpoint()">Test /partners/public/38/</button>
    <div id="result"></div>

    <script>
        async function testEndpoint() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const url = 'http://localhost:8000/partners/public/38/';
                console.log('Testing:', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });
                
                console.log('Response:', {
                    status: response.status,
                    statusText: response.statusText,
                    ok: response.ok,
                    url: response.url
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `
                        <h2>✅ Success!</h2>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const error = await response.json().catch(() => ({ error: response.statusText }));
                    resultDiv.innerHTML = `
                        <h2>❌ Error ${response.status}</h2>
                        <pre>${JSON.stringify(error, null, 2)}</pre>
                    `;
                }
            } catch (err) {
                console.error('Error:', err);
                resultDiv.innerHTML = `
                    <h2>💥 Exception</h2>
                    <p>${err.message}</p>
                    <p>Check console for details</p>
                `;
            }
        }
    </script>
</body>
</html>
