[pytest]
DJANGO_SETTINGS_MODULE = airbcar_backend.settings
python_files = tests.py test_*.py *_tests.py
testpaths = tests
addopts = 
    --cov=airbcar_backend
    --cov=core
    --cov=users
    --cov=bookings
    --cov-report=html
    --cov-report=term-missing
    --strict-markers
    -v
    --tb=short
markers =
    unit: Unit tests for models and serializers
    integration: Integration tests for API endpoints
    performance: Performance and load tests
    e2e: End-to-end workflow tests
    slow: Slow tests (use -m "not slow" to skip)
    requires_database: Tests that require database access
